# Projects
# category: instruments | investigations
# badge_color: any CSS color var token (sage, plum, rose, sky, gold)

instruments:
  - title: "Triton 🔱"
    badge: "Open Source"
    badge_color: plum
    desc: >
      An audio signal processing toolkit for hearing and communication research.
      Triton organizes stimulus preparation around a project-centric workflow — import and
      auto-normalize audio, apply multi-label categorization, build reproducible processing
      pipelines with parameter sweeps, and generate or degrade stimuli with precise control
      over level, noise, and envelope shape. Every step is logged with JSON sidecar provenance.
    details: "Interfaces: Streamlit GUI · CLI · Python API. Audio ops: SNR mixing, 4 ramp envelopes (linear/exp/log/cosine), RMS normalization. Visualization: STFT, Mel, and CQT spectrograms. Stack: Python + FFmpeg + librosa, env-locked with Pixi. MIT licensed."
    links:
      - label: GitHub
        url: https://github.com/AliTafakkor/triton
        primary: true
      - label: Docs
        url: https://alitafakkor.me/triton

investigations:
  - title: "Auditory–MD Network Connectivity"
    badge: "Ongoing Research"
    badge_color: rose
    desc: >
      Using fMRI with naturalistic speech stories at varying SNRs to map how
      auditory cortex and the Multiple Demand Network reconfigure under degraded
      listening conditions.
    details: >
      The right insula emerges as a key hub — bridging auditory and cognitive
      systems when speech becomes hard to follow.
    links:
      - label: View Poster
        url: "#publications"
        primary: true
      - label: CoNCH Lab
        url: https://www.conchlab.uwo.ca/

  - title: "Eplink"
    badge: "Collaboration"
    badge_color: sky
    desc: >
      A Snakemake/Snakebids pipeline for preprocessing and analyzing epilepsy fMRI data.
      Runs end-to-end from raw BIDS input through fMRIprep, FreeSurfer surface extraction,
      fsLR 32k projection, and inter-subject correlation (ISC) analysis across four parcellation atlases.
    details: "Scales to 100 concurrent SLURM jobs on the Alliance Canada cluster. Supports Desikan, Glasser, Schaefer, and Yan atlases."
    links:
      - label: GitHub
        url: https://github.com/CoNCHLab-Github/Eplink
        primary: true
