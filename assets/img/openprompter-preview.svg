  <text x="306" y="16.5" font-family="monospace" font-size="7" fill="#5bada0" text-anchor="middle" letter-spacing="0.06em">MIRROR ON</text>

  <rect x="322" y="32" width="10" height="120" rx="4" fill="#1a1a24"/>
  <rect x="322" y="76" width="10" height="42" rx="4" fill="#1d9e75" opacity="0.55"/>
