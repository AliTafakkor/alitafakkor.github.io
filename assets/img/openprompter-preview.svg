  <text x="327" y="162" font-family="monospace" font-size="6.5" fill="#2d5c50" text-anchor="middle">1.2×</text>

  <rect x="0" y="81" width="316" height="20" fill="#1d9e75" opacity="0.09"/>
  <rect x="0" y="81" width="3" height="20" fill="#1d9e75" opacity="0.9"/>
  <line x1="3" y1="81" x2="316" y2="81" stroke="#1d9e75" stroke-width="0.7" opacity="0.35"/>
  <line x1="3" y1="101" x2="316" y2="101" stroke="#1d9e75" stroke-width="0.7" opacity="0.35"/>

  <text x="158" y="46" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.15" text-anchor="middle">and in the spaces between silence,</text>
  <text x="158" y="60" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.30" text-anchor="middle">we find the words that carry weight —</text>
  <text x="158" y="74" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.55" text-anchor="middle">the kind that shape a room,</text>

  <text x="158" y="94.5" font-family="monospace" font-size="9.5" fill="#ffffff" text-anchor="middle">before a single sound is made.</text>

  <text x="158" y="113" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.55" text-anchor="middle">this is where the voice begins</text>
  <text x="158" y="127" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.30" text-anchor="middle">its quiet and deliberate work —</text>
  <text x="158" y="141" font-family="monospace" font-size="9" fill="#e2e8f0" opacity="0.15" text-anchor="middle">finding rhythm, finding breath.</text>

  <rect y="154" width="340" height="26" fill="#141420"/>
