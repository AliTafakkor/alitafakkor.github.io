<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 180">
  <!-- Background -->
  <rect width="340" height="180" fill="#12121f"/>

  <!-- Top bar -->
  <rect width="340" height="32" fill="#1a1a2e"/>
  <!-- Traffic lights -->
  <circle cx="16" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="30" cy="16" r="5" fill="#febc2e"/>
  <circle cx="44" cy="16" r="5" fill="#28c840"/>
  <!-- Title -->
  <text x="90" y="21" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7dd3fc" font-weight="500" text-anchor="middle">tmux cheat sheet</text>

  <!-- Prefix pill -->
  <rect x="246" y="8" width="84" height="17" rx="4" fill="#1e2d42" stroke="#2a3850" stroke-width="1"/>
  <text x="255" y="16" font-family="monospace" font-size="6.5" fill="#94a3b8" letter-spacing="0.06em" text-transform="uppercase">DEFAULT PREFIX</text>
  <text x="268" y="23" font-family="monospace" font-size="8" fill="#7dd3fc" font-weight="500">Ctrl + b</text>

  <!-- Column divider -->
  <line x1="170" y1="38" x2="170" y2="175" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Left column header -->
  <circle cx="20" cy="46" r="4" fill="#7a9e7e"/>
  <text x="29" y="50" font-family="monospace" font-size="7.5" fill="#94a3b8" font-weight="600" letter-spacing="0.1em">SESSIONS</text>

  <!-- Left column rows -->
  <!-- Row 1: $ tmux new -s name -->
  <rect x="12" y="56" width="88" height="13" rx="2.5" fill="#1e2d42" stroke="#2a3850" stroke-width="0.8"/>
  <text x="17" y="66" font-family="monospace" font-size="7.5" fill="#7dd3fc">$ tmux new -s name</text>
  <text x="106" y="66" font-family="monospace" font-size="7.5" fill="#64748b">New named session</text>

  <!-- Row 2: prefix d -->
  <rect x="12" y="73" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="17" y="83" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="47" y="83" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="52" y="73" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="56" y="83" font-family="monospace" font-size="7.5" fill="#e2e8f0">d</text>
  <text x="70" y="83" font-family="monospace" font-size="7.5" fill="#64748b">Detach</text>

  <!-- Row 3: prefix s -->
  <rect x="12" y="90" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="17" y="100" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="47" y="100" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="52" y="90" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="56" y="100" font-family="monospace" font-size="7.5" fill="#e2e8f0">s</text>
  <text x="70" y="100" font-family="monospace" font-size="7.5" fill="#64748b">List sessions</text>

  <!-- Panes section left -->
  <circle cx="20" cy="115" r="4" fill="#c9a056"/>
  <text x="29" y="119" font-family="monospace" font-size="7.5" fill="#94a3b8" font-weight="600" letter-spacing="0.1em">PANES</text>

  <!-- Row prefix % -->
  <rect x="12" y="124" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="17" y="134" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="47" y="134" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="52" y="124" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="56" y="134" font-family="monospace" font-size="7.5" fill="#e2e8f0">%</text>
  <text x="70" y="134" font-family="monospace" font-size="7.5" fill="#64748b">Split vertical</text>

  <!-- Row prefix z -->
  <rect x="12" y="141" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="17" y="151" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="47" y="151" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="52" y="141" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="56" y="151" font-family="monospace" font-size="7.5" fill="#e2e8f0">z</text>
  <text x="70" y="151" font-family="monospace" font-size="7.5" fill="#64748b">Zoom pane</text>

  <!-- Right column header -->
  <circle cx="180" cy="46" r="4" fill="#6e92b8"/>
  <text x="189" y="50" font-family="monospace" font-size="7.5" fill="#94a3b8" font-weight="600" letter-spacing="0.1em">WINDOWS</text>

  <!-- Right rows -->
  <rect x="180" y="56" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="185" y="66" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="215" y="66" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="220" y="56" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="224" y="66" font-family="monospace" font-size="7.5" fill="#e2e8f0">c</text>
  <text x="238" y="66" font-family="monospace" font-size="7.5" fill="#64748b">New window</text>

  <rect x="180" y="73" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="185" y="83" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="215" y="83" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="220" y="73" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="224" y="83" font-family="monospace" font-size="7.5" fill="#e2e8f0">n</text>
  <text x="238" y="83" font-family="monospace" font-size="7.5" fill="#64748b">Next window</text>

  <rect x="180" y="90" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="185" y="100" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="215" y="100" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="220" y="90" width="22" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="224" y="100" font-family="monospace" font-size="7.5" fill="#e2e8f0">0–9</text>
  <text x="246" y="100" font-family="monospace" font-size="7.5" fill="#64748b">Switch #</text>

  <!-- Copy mode right -->
  <circle cx="180" cy="115" r="4" fill="#5bada0"/>
  <text x="189" y="119" font-family="monospace" font-size="7.5" fill="#94a3b8" font-weight="600" letter-spacing="0.1em">COPY MODE</text>

  <rect x="180" y="124" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="185" y="134" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="215" y="134" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="220" y="124" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="226" y="134" font-family="monospace" font-size="7.5" fill="#e2e8f0">[</text>
  <text x="238" y="134" font-family="monospace" font-size="7.5" fill="#64748b">Enter copy</text>

  <rect x="180" y="141" width="32" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="185" y="151" font-family="monospace" font-size="7.5" fill="#e2e8f0">prefix</text>
  <text x="215" y="151" font-family="monospace" font-size="8" fill="#64748b">›</text>
  <rect x="220" y="141" width="13" height="13" rx="2.5" fill="#2d2d3d" stroke="#3d3d5a" stroke-width="0.8"/>
  <text x="226" y="151" font-family="monospace" font-size="7.5" fill="#e2e8f0">]</text>
  <text x="238" y="151" font-family="monospace" font-size="7.5" fill="#64748b">Paste</text>

  <!-- Bottom bar -->
  <rect y="164" width="340" height="16" fill="#1a1a2e"/>
  <text x="12" y="175" font-family="monospace" font-size="7" fill="#4a5568">prefix = Ctrl+b  ·  sessions  ·  windows  ·  panes  ·  copy mode</text>
</svg>
