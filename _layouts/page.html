<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  {% if site.favicon %}<link rel="icon" type="image/png" href="{{ site.favicon | relative_url }}" />{% endif %}
  {% if site.favicon_dark %}<link rel="icon" type="image/png" href="{{ site.favicon_dark | relative_url }}" media="(prefers-color-scheme: dark)" />{% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/landing.css' | relative_url }}" />

  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}

  <style>
    .page-wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 80px 1.5rem 5rem;
    }
    .page-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .page-nav a.home-link {
      font: 600 15px var(--sans);
      color: var(--sage);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .page-nav a.home-link:hover { opacity: 0.75; }
    .page-breadcrumb {
      font: 400 13px var(--sans);
      color: var(--text-muted);
    }
    .page-breadcrumb a { color: var(--sage); text-decoration: none; }
    .page-breadcrumb span { color: var(--text-dim); margin: 0 6px; }
  </style>
</head>
<body>

<div class="page-wrapper">
  <nav class="page-nav" aria-label="Site navigation">
    <a class="home-link" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <span class="page-breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span>›</span>
      {{ page.title }}
    </span>
  </nav>

  <main>
    {{ content }}
  </main>
</div>

<script>
  // Persist dark mode from landing page
  if (localStorage.getItem('at-dark') === 'true') document.body.classList.add('theme-dark');
</script>

</body>
</html>
